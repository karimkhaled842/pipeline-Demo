# ==============================================================================
# Reusable Workflow: Build & SBOM
# ==============================================================================
# Builds and pushes Docker images with:
#   - Docker Buildx with BuildKit
#   - Multi-tag metadata (SHA-based)
#   - GitHub Container Registry push
#   - SBOM generation (SPDX, CycloneDX)
#   - Build summary
#
# Usage:
#   jobs:
#     build:
#       uses: <org>/<repo>/.github/workflows/build.yml@main
#       with:
#         registry: ghcr.io
#         image-name: ${{ github.repository }}
# ==============================================================================

name: "Reusable - Build & SBOM"

on:
  workflow_call:
    inputs:
      registry:
        description: "Container registry hostname"
        type: string
        required: false
        default: "ghcr.io"
      image-name:
        description: "Image repository name (e.g., org/repo)"
        type: string
        required: true
    outputs:
      image-tag:
        description: "Docker image tag(s) generated by docker/metadata-action"
        value: ${{ jobs.build.outputs.image-tag }}
      image-digest:
        description: "Docker image digest from build"
        value: ${{ jobs.build.outputs.image-digest }}
      sbom-path:
        description: "Path to the generated SPDX SBOM file"
        value: ${{ jobs.build.outputs.sbom-path }}

# Minimum required permissions
permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    name: "🔵 Build & SBOM"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      sbom-path: ${{ steps.sbom.outputs.sbom-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config: .github/buildkitd.toml
          driver-opts: |
            image=moby/buildkit:v0.12.5
            network=host

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          sbom: true

      - name: Generate SBOM with Syft
        id: sbom
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ steps.meta.outputs.tags }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate Additional SBOM Formats
        run: |
          # CycloneDX format
          syft ${{ steps.meta.outputs.tags }} \
            -o cyclonedx-json > sbom.cyclonedx.json

          # Table format for human reading
          syft ${{ steps.meta.outputs.tags }} \
            -o template -t csv.tmpl > sbom.txt

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.*.json
            sbom.txt
          retention-days: 90

      - name: Summary
        run: |
          echo "## 🔵 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | \`sbom.spdx.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SBOM Contents Summary" >> $GITHUB_STEP_SUMMARY
          cat sbom.txt >> $GITHUB_STEP_SUMMARY
