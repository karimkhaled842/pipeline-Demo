# ==============================================================================
# Reusable Workflow: Test
# ==============================================================================
# Runs unit tests, integration tests, and security tests with:
#   - PostgreSQL 16 (service container)
#   - Redis 7 (service container)
#   - pytest with coverage, xdist, and various plugins
#   - Test result publishing and PR coverage comments
#
# Usage:
#   jobs:
#     test:
#       uses: <org>/<repo>/.github/workflows/test.yml@main
#       with:
#         python-version: '3.12'
#         coverage-threshold-unit: 80
#         coverage-threshold-integration: 70
# ==============================================================================

name: "Reusable - Test"

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use for testing"
        type: string
        required: false
        default: "3.12"
      coverage-threshold-unit:
        description: "Minimum coverage percentage for unit tests"
        type: number
        required: false
        default: 80
      coverage-threshold-integration:
        description: "Minimum coverage percentage for integration tests"
        type: number
        required: false
        default: 70

# Minimum required permissions
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: "🟡 Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/app/requirements.txt
          pip install pytest pytest-cov pytest-asyncio==0.21.2 pytest-mock \
            pytest-xdist pytest-timeout factory-boy faker \
            pytest-postgres pytest-redis httpx

      - name: Run Unit Tests with Coverage
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
        run: |
          pytest src/app/tests/ \
            --cov=src/app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold-unit }} \
            -v \
            --tb=short \
            --junitxml=junit-results.xml \
            --timeout=60

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
        run: |
          pytest src/app/tests/integration/ \
            --cov=src/app \
            --cov-report=xml:integration-coverage.xml \
            --cov-append \
            --cov-fail-under=${{ inputs.coverage-threshold-integration }} \
            -v \
            --tb=short \
            --junitxml=integration-junit.xml \
            -m integration

      - name: Run Security Tests
        run: |
          pytest src/app/tests/security/ \
            -v \
            --tb=short \
            --junitxml=security-junit.xml \
            -m security

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            coverage.xml
            integration-coverage.xml
            htmlcov/
            junit-results.xml
            integration-junit.xml
            security-junit.xml
            coverage.svg
          retention-days: 30

      - name: Publish Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: "*junit*.xml"
          reporter: java-junit
          fail-on-error: false
          use-actions-summary: "true"
