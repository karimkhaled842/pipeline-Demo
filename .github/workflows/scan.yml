# ==============================================================================
# Reusable Workflow: Image Scan
# ==============================================================================
# Scans container images for vulnerabilities, secrets, and misconfigurations:
#   - Trivy Vulnerability Scanner (OS & library)
#   - Trivy Config Scanner (Kubernetes manifests)
#   - Trivy Secret Scanner
#   - SARIF upload to GitHub Security tab
#
# Usage:
#   jobs:
#     scan:
#       uses: <org>/<repo>/.github/workflows/scan.yml@main
#       with:
#         registry: ghcr.io
#         image-name: ${{ github.repository }}
#         image-tag: ${{ needs.build.outputs.image-tag }}
# ==============================================================================

name: "Reusable - Image Scan"

on:
  workflow_call:
    inputs:
      registry:
        description: "Container registry hostname"
        type: string
        required: true
      image-name:
        description: "Image repository name (e.g., namespace/repo)"
        type: string
        required: true
      image-sha:
        description: "Short commit SHA used as the image tag (e.g. a1b2c3d)"
        type: string
        required: true
    secrets:
      DOCKERHUB_USERNAME:
        description: "Docker Hub username (to pull the private image)"
        required: true
      DOCKERHUB_TOKEN:
        description: "Docker Hub access token"
        required: true

# Minimum required permissions
permissions:
  contents: write
  security-events: write
  packages: write

jobs:
  scan:
    name: "🟣 Image Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image reference
        id: img
        run: echo "image-ref=${{ inputs.image-name }}:sha-${{ inputs.image-sha }}" >> $GITHUB_OUTPUT

      - name: Debug image ref
        run: echo "Scanning: ${{ steps.img.outputs.image-ref }}"

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-artifacts
          path: sbom/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------------------------------------------------
      # TRIVY SCANNER
      # -------------------------------------------------------------------------
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "${{ steps.img.outputs.image-ref }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"
          trivyignores: ".trivyignore"
          timeout: "10m"
          cache: "false"
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db

      - name: Run Trivy Config Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "k8s/"
          format: "table"
          output: "trivy-config-results.txt"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
          exit-code: "1"

      - name: Run Trivy Secret Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "${{ steps.img.outputs.image-ref }}"
          format: "json"
          output: "trivy-secrets.json"
          scanners: "secret"
          exit-code: "1"

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # -------------------------------------------------------------------------
      # Common Steps
      # -------------------------------------------------------------------------
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results-trivy
          path: |
            *-results.*
            *-results.json
          retention-days: 90

      - name: Scan Summary
        if: always()
        run: |
          echo "## 🟣 Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "*-results.txt" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat *-results.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
