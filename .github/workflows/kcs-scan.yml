# ==============================================================================
# Reusable Workflow: KCS Image Scan
# ==============================================================================
# Scans container images using Kaspersky Container Security (KCS) scanner:
#   - Pulls KCS scanner image from repo.kcs.kaspersky.com
#   - Scans the built image for vulnerabilities, malware, config & secrets
#   - Connects to KCS API for policies + assurance gating
#   - Uploads HTML + JSON reports as artifacts
#
# Usage:
#   jobs:
#     kcs-scan:
#       uses: <org>/<repo>/.github/workflows/kcs-scan.yml@main
#       with:
#         registry: docker.io
#         image-name: karimkhaledopsera/pipeline-demo
#         image-tag: karimkhaledopsera/pipeline-demo:sha-xxxxxx
#       secrets:
#         API_TOKEN: ${{ secrets.API_TOKEN }}
#         KCS_REGISTRY_USERNAME: ${{ secrets.KCS_REGISTRY_USERNAME }}
#         KCS_REGISTRY_PASSWORD: ${{ secrets.KCS_REGISTRY_PASSWORD }}
#         COMPANY_EXT_REGISTRY_USERNAME: ${{ secrets.COMPANY_EXT_REGISTRY_USERNAME }}
#         COMPANY_EXT_REGISTRY_PASSWORD: ${{ secrets.COMPANY_EXT_REGISTRY_PASSWORD }}
# ==============================================================================

name: "Reusable - KCS Image Scan"

on:
  workflow_call:
    inputs:
      registry:
        description: "Container registry hostname"
        type: string
        required: true
      image-name:
        description: "Image repository name (e.g., namespace/repo)"
        type: string
        required: true
      image-tag:
        description: "Full image reference to scan (registry/image:tag or image:tag)"
        type: string
        required: true
    secrets:
      API_TOKEN:
        description: "KCS API authentication token"
        required: true
      KCS_REGISTRY_USERNAME:
        description: "Username for repo.kcs.kaspersky.com (Kaspersky registry)"
        required: true
      KCS_REGISTRY_PASSWORD:
        description: "Password for repo.kcs.kaspersky.com (Kaspersky registry)"
        required: true
      COMPANY_EXT_REGISTRY_USERNAME:
        description: "Docker Hub username (so scanner can pull the private image)"
        required: true
      COMPANY_EXT_REGISTRY_PASSWORD:
        description: "Docker Hub access token (so scanner can pull the private image)"
        required: true

permissions:
  contents: read
  packages: read

jobs:
  kcs-scan:
    name: "🛡️ KCS Image Scan"
    runs-on: ubuntu-latest
    env:
      SCAN_TARGET: ${{ inputs.image-tag }}
      BUILD_NUMBER: ${{ github.run_id }}
      BUILD_PIPELINE: ${{ github.run_id }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      COMPANY_EXT_REGISTRY_USERNAME: ${{ secrets.COMPANY_EXT_REGISTRY_USERNAME }}
      COMPANY_EXT_REGISTRY_PASSWORD: ${{ secrets.COMPANY_EXT_REGISTRY_PASSWORD }}
      API_BASE_URL: https://kcs.karimocp.website
      RUST_BACKTRACE: full
    steps:
      - name: Login to Kaspersky registry (pull the scanner image)
        env:
          KCS_USER: ${{ secrets.KCS_REGISTRY_USERNAME }}
          KCS_PASS: ${{ secrets.KCS_REGISTRY_PASSWORD }}
        run: docker login repo.kcs.kaspersky.com -u "$KCS_USER" -p "$KCS_PASS"

      - name: Debug SCAN_TARGET
        run: echo "SCAN_TARGET='${SCAN_TARGET}'"

      - name: Run KCS Scanner (JSON report)
        run: |
          docker run --rm \
            -e SCAN_TARGET \
            -e BUILD_NUMBER \
            -e BUILD_PIPELINE \
            -e API_TOKEN \
            -e COMPANY_EXT_REGISTRY_USERNAME \
            -e COMPANY_EXT_REGISTRY_PASSWORD \
            -e API_BASE_URL \
            -e RUST_BACKTRACE \
            repo.kcs.kaspersky.com/images/scanner:v2.5.0-with-db \
            "$SCAN_TARGET" --stdout > kcs-scan-report.json

      - name: Run KCS Scanner (HTML report)
        run: |
          docker run --rm \
            -e SCAN_TARGET \
            -e BUILD_NUMBER \
            -e BUILD_PIPELINE \
            -e API_TOKEN \
            -e COMPANY_EXT_REGISTRY_USERNAME \
            -e COMPANY_EXT_REGISTRY_PASSWORD \
            -e API_BASE_URL \
            -e RUST_BACKTRACE \
            repo.kcs.kaspersky.com/images/scanner:v2.5.0-with-db \
            "$SCAN_TARGET" --html --stdout > kcs-scan-report.html

      - name: Upload KCS Scan JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: kcs-scan-report-json
          path: kcs-scan-report.json
          retention-days: 90

      - name: Upload KCS Scan HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: kcs-scan-report-html
          path: kcs-scan-report.html
          retention-days: 90

      - name: KCS Scan Summary
        run: |
          echo "## 🛡️ KCS Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scanned image:** \`${{ inputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**KCS API:** \`${{ env.API_BASE_URL }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scanner:** \`repo.kcs.kaspersky.com/images/scanner:v2.5.0-with-db\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "KCS scan JSON + HTML reports uploaded as artifacts." >> $GITHUB_STEP_SUMMARY