      echo "| Stage                     | Status        |"
      echo "+---------------------------+---------------+"
      echo "| Lint                      | Completed     |"
      echo "| Test                      | Completed     |"
      echo "| SonarQube                 | Completed     |"
      echo "| Build & SBOM              | Completed     |"
      echo "| Image Scan                | Completed     |"
      echo "| Sign                      | Completed     |"
      echo "| Deploy                    | Completed     |"
      echo "+---------------------------+---------------+"
      echo ""
      echo "Pipeline completed. Review individual stage results in Azure DevOps UI."
      echo ""
      echo "============================================"
      echo "  Artifacts Generated"
      echo "============================================"
      echo "  - Lint Reports (Bandit, Pylint, Mypy)"
      echo "  - Test Coverage Reports"
