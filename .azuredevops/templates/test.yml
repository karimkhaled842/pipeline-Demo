---
parameters:
  - name: pythonVersion
    type: string
    default: '3.12'
  - name: coverageThresholdUnit
    type: number
    default: 80
  - name: coverageThresholdIntegration
    type: number
    default: 70

steps:
  - task: UsePythonVersion@0
    displayName: 'Use Python ${{ parameters.pythonVersion }}'
    inputs:
      versionSpec: ${{ parameters.pythonVersion }}
      addToPath: true
      architecture: 'x64'

  - script: |
      python -m pip install --upgrade pip
      pip install -r src/app/requirements.txt
      pip install pytest pytest-cov pytest-asyncio==0.21.2 pytest-mock \
        pytest-xdist pytest-timeout factory-boy faker \
        pytest-postgres pytest-redis httpx
    displayName: 'Install test dependencies'

  - script: |
      pytest src/app/tests/ \
        --cov=src/app \
        --cov-report=xml:coverage.xml \
        --cov-report=html:htmlcov \
        --cov-report=term-missing \
        --cov-fail-under=${{ parameters.coverageThresholdUnit }} \
        -v \
        --tb=short \
        --junitxml=junit-results.xml \
        --timeout=60
    displayName: 'Run unit tests with coverage'
    env:
      DATABASE_URL: $(DATABASE_URL)
      REDIS_URL: $(REDIS_URL)
      ENVIRONMENT: $(ENVIRONMENT)

  - script: |
      pytest src/app/tests/integration/ \
        --cov=src/app \
        --cov-report=xml:integration-coverage.xml \
        --cov-append \
        --cov-fail-under=${{ parameters.coverageThresholdIntegration }} \
        -v \
        --tb=short \
        --junitxml=integration-junit.xml \
        -m integration
    displayName: 'Run integration tests'
    env:
      DATABASE_URL: $(DATABASE_URL)
      REDIS_URL: $(REDIS_URL)
      ENVIRONMENT: $(ENVIRONMENT)

  - script: |
      pytest src/app/tests/security/ \
        -v \
        --tb=short \
        --junitxml=security-junit.xml \
        -m security
    displayName: 'Run security tests'

  - script: |
      mkdir -p $(Build.ArtifactStagingDirectory)/test-reports
      cp coverage.xml $(Build.ArtifactStagingDirectory)/test-reports/ 2>/dev/null || true
      cp integration-coverage.xml $(Build.ArtifactStagingDirectory)/test-reports/ 2>/dev/null || true
      cp -r htmlcov $(Build.ArtifactStagingDirectory)/test-reports/ 2>/dev/null || true
      cp junit-results.xml $(Build.ArtifactStagingDirectory)/test-reports/ 2>/dev/null || true
      cp integration-junit.xml $(Build.ArtifactStagingDirectory)/test-reports/ 2>/dev/null || true
      cp security-junit.xml $(Build.ArtifactStagingDirectory)/test-reports/ 2>/dev/null || true
    displayName: 'Stage test results'
    condition: always()

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: |
        junit-results.xml
        integration-junit.xml
        security-junit.xml
      failTaskOnFailedTests: true
    condition: always()

  - task: PublishCodeCoverageResults@1
    displayName: 'Publish code coverage'
    inputs:
      codeCoverageTool: 'Cobertura'
      summaryFileLocation: coverage.xml
      reportDirectory: htmlcov
    condition: always()

  - task: PublishPipelineArtifact@1
    displayName: 'Publish test reports'
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)/test-reports
      artifact: test-reports
      publishLocation: pipeline
    condition: always()
