[pytest]
asyncio_mode = auto
testpaths = src/app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    integration: marks tests as integration tests (require live DB + Redis)
    security: marks tests as security-focused tests
    unit: marks tests as unit tests
    slow: marks tests that are slow to execute

# Coverage
addopts =
    --strict-markers
    --tb=short
    -v

# Timeout default (can be overridden per-test)
timeout = 60

# Logging
log_cli = true
log_cli_level = WARNING
log_level = WARNING
