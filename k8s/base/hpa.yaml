---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secureapp
  labels:
    app.kubernetes.io/name: secureapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: secureapp-pdb
  labels:
    app.kubernetes.io/name: secureapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secureapp
      app.kubernetes.io/component: api
