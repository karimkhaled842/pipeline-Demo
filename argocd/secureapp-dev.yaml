---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secureapp-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: secureapp
    app.kubernetes.io/environment: development
spec:
  project: default
  source:
    repoURL: https://github.com/ahmed-magdi2712/DevSecOps-Usecase.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: secureapp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
